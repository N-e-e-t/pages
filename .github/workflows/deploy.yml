name: Deploy GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1"
          working-directory: blog

      - name: Install blog dependencies
        working-directory: blog
        run: |
          bundle lock --add-platform x86_64-linux
          bundle install

      - name: Prepare static site root
        run: |
          mkdir -p _site
          cp index.html _site/index.html
          cp privacy.html _site/privacy.html
          cp README.md _site/README.md
          cp -r css _site/css
          cp -r images _site/images
          cp -r scripts _site/scripts

      - name: Build blog into /blog
        working-directory: blog
        run: bundle exec jekyll build --destination ../_site/blog

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
