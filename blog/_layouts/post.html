---
layout: default
---

<section class="page-hero">
  <div class="hero-inner">
    <p class="hero-kicker">Post</p>
    <h1 class="hero-title">{{ page.title | escape }}</h1>
    <p class="hero-copy">{{ page.date | date: "%Y-%m-%d" }}{% if page.categories and page.categories != empty %} | {{ page.categories | join: " / " }}{% endif %}</p>
  </div>
</section>

<main class="content-wrap">
  <article class="post-card">
    {{ content }}
  </article>
</main>
